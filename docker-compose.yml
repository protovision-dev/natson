services:
  browser-api:
    build: ./browser-api
    container_name: natson-browser-api
    ports:
      - "8765:8765"
    restart: unless-stopped
    env_file:
      - ./browser-api/.env
    environment:
      MAX_CONCURRENCY: "${MAX_CONCURRENCY:-4}"
      DEFAULT_UA: "${DEFAULT_UA:-Mozilla/5.0 (Macintosh; Intel Mac OS X 10.15; rv:140.0) Gecko/20100101 Firefox/140.0}"
      DEFAULT_OS: "${DEFAULT_OS:-macos}"
      DEFAULT_LOCALE: "${DEFAULT_LOCALE:-en-US}"
      PROXY_SERVER: "${PROXY_SERVER}"
      PROXY_USERNAME: "${PROXY_USERNAME}"
      PROXY_PASSWORD: "${PROXY_PASSWORD}"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8765/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - natson

  scraper:
    build: ./scraper
    image: natson-scraper:latest
    container_name: natson-scraper
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      browser-api:
        condition: service_started
    env_file:
      - .env
    environment:
      BROWSER_API: "http://browser-api:8765"
      OUT_DIR: "/app/output"
      HOTELS_FILE: "/app/hotels.json"
      # Dual-write JSON → Postgres.  Opt out with WRITE_DB=0 for debugging.
      WRITE_DB: "${WRITE_DB:-1}"
    volumes:
      - session_vol:/app/output:rw
      # Bind-mount hotels.json + subject_hotels.json so admin.py edits
      # persist on the host (and git).
      - ./scraper/hotels.json:/app/hotels.json:rw
      - ./scraper/subject_hotels.json:/app/subject_hotels.json:rw
    networks:
      - natson

  scraper-login:
    # Keeps /app/output/session.json fresh; checks every ~15 min, re-logs
    # in via browser-api when <2h remain on the 24h TTL.  Uses the same
    # image as `scraper`.
    image: natson-scraper:latest
    container_name: natson-scraper-login
    restart: unless-stopped
    depends_on:
      browser-api:
        condition: service_healthy
    env_file:
      - .env
    environment:
      BROWSER_API: "http://browser-api:8765"
      OUT_DIR: "/app/output"
      LOGIN_CHECK_INTERVAL_S: "${LOGIN_CHECK_INTERVAL_S:-900}"
      LOGIN_MARGIN_S: "${LOGIN_MARGIN_S:-7200}"
    volumes:
      - session_vol:/app/output:rw
    command: ["python", "login_daemon.py"]
    networks:
      - natson

  postgres:
    build: ./postgres
    image: natson-postgres:latest
    container_name: natson-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    env_file:
      - .env
    environment:
      POSTGRES_DB: "${POSTGRES_DB}"
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    command:
      - postgres
      - -c
      - config_file=/etc/postgresql/postgresql.conf
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
      - ./postgres/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - natson

  jobs-api:
    build: ./jobs-api
    image: natson-jobs-api:latest
    container_name: natson-jobs-api
    restart: unless-stopped
    ports:
      - "${JOBS_API_PORT:-8770}:8770"
    depends_on:
      postgres:
        condition: service_healthy
      scraper:
        condition: service_started
    env_file:
      - .env
    environment:
      OUT_DIR: "/app/output"
      RUN_JOB_PY: "/app/run_job.py"
      SCRAPER_CWD: "/app"
      MAX_PARALLEL_JOBS: "${MAX_PARALLEL_JOBS:-2}"
      BROWSER_API: "http://browser-api:8765"
      WRITE_DB: "${WRITE_DB:-1}"
      HOTELS_FILE: "/app/hotels.json"
    volumes:
      # Share session.json + status.json + log dirs with scraper + scraper-login.
      - session_vol:/app/output:rw
      - ./scraper/hotels.json:/app/hotels.json:ro
      - ./scraper/subject_hotels.json:/app/subject_hotels.json:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8770/health').read()"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - natson

  web:
    build: ./web
    image: natson-web:latest
    container_name: natson-web
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-3000}:3000"
    depends_on:
      postgres:
        condition: service_healthy
      jobs-api:
        condition: service_started
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgres://natson_ro:${NATSON_RO_PASSWORD}@postgres:5432/${POSTGRES_DB}"
      AUTH_DATABASE_URL: "postgres://natson_auth:${NATSON_AUTH_PASSWORD}@postgres:5432/${POSTGRES_DB}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET}"
      BETTER_AUTH_URL: "${BETTER_AUTH_URL:-http://localhost:3000}"
      NEXT_PUBLIC_BETTER_AUTH_URL: "${BETTER_AUTH_URL:-http://localhost:3000}"
      JOBS_API: "http://jobs-api:8770"
      NODE_ENV: production
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:3000/api/auth/ok"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - natson

volumes:
  pg_data:
  session_vol:

networks:
  natson:
    driver: bridge
