# Pre-commit hooks. Install once on dev machines:
#   pipx install pre-commit  # or: brew install pre-commit
#   pre-commit install
# CI re-runs the same checks via .github/workflows/ci.yml.

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-yaml
        args: ["--allow-multiple-documents"]
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=2048"]
      - id: detect-private-key

  # Python: ruff handles both lint + format (replaces black/isort/flake8).
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  # JS/TS: prettier + eslint. Run only on staged web/ files; the prettier
  # config lives at web/.prettierrc.json.
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        files: ^web/.+\.(ts|tsx|js|jsx|json|md|css)$
        additional_dependencies:
          - prettier@3.4.2
          - prettier-plugin-tailwindcss@0.6.9

  # Secret scanning: blocks accidental commits of API keys, tokens, etc.
  # Filesystem mode (not git history) — fast on the staged diff.
  - repo: https://github.com/trufflesecurity/trufflehog
    rev: v3.84.2
    hooks:
      - id: trufflehog
        name: trufflehog secret scan
        entry: trufflehog filesystem . --fail --no-update --only-verified
        language: system
        pass_filenames: false
