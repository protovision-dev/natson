# Minimal overlay over the image defaults.  Anything we don't set
# here falls through to postgres's internal defaults (plus any
# command-line `-c key=value` flags).

# Listen on all interfaces inside the container.
listen_addresses         = '*'

# pg_cron: schedule SQL jobs inside Postgres.
shared_preload_libraries = 'pg_cron'

# Which DB the cron schema + job table live in.  Only one DB per
# instance can host pg_cron's metadata.
cron.database_name       = 'natson'
