# Production overlay. Apply on top of the base compose file:
#
#   docker compose \
#       -f docker-compose.yml \
#       -f deploy/docker-compose.prod.yml \
#       up -d
#
# What changes vs dev:
#   - Caddy is added as the only public-facing service (80, 443).
#   - web stops publishing its own port; only Caddy reaches it
#     internally.
#   - web is pinned to NODE_ENV=production and its BETTER_AUTH_URL
#     points at https://$DOMAIN.
#   - All services have `restart: always` so systemd-equivalent
#     recovery is handled by docker.

services:
  caddy:
    image: caddy:2-alpine
    container_name: natson-caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp" # HTTP/3 (QUIC)
    volumes:
      - ../deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN: "${DOMAIN}"
    depends_on:
      web:
        condition: service_healthy
    networks:
      - natson

  web:
    # Replace the dev port mapping — only Caddy reaches web internally.
    ports: []
    restart: always
    environment:
      NODE_ENV: production
      BETTER_AUTH_URL: "https://${DOMAIN}"
      NEXT_PUBLIC_BETTER_AUTH_URL: "https://${DOMAIN}"

  jobs-api:
    restart: always

  browser-api:
    restart: always

  scraper-login:
    restart: always

  postgres:
    restart: always

volumes:
  caddy_data:
  caddy_config:
