name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel in-progress runs of the same workflow on a branch when a new
# commit lands. Saves runner time + gives the latest commit's results
# faster.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write # for build-images push to ghcr.io
  pull-requests: read

jobs:
  # -----------------------------------------------------------------
  # Web (Next.js / TypeScript)
  # -----------------------------------------------------------------
  lint-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/package-lock.json
      - run: npm ci
        working-directory: web
      - run: npm run lint
        working-directory: web
      - run: npm run typecheck
        working-directory: web
      - run: npm run format:check
        working-directory: web

  test-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: web/package-lock.json
      - run: npm ci
        working-directory: web
      - run: npm test
        working-directory: web

  # -----------------------------------------------------------------
  # Python (scraper, jobs-api, browser-api)
  # -----------------------------------------------------------------
  lint-py:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff==0.8.4 mypy==1.13.0
      - run: ruff check .
      - run: ruff format --check .
      # mypy lenient — catches obvious bugs only. Skip if scraper deps
      # aren't installed; the type stubs we care about live in the
      # service requirements.
      - name: Install service deps for mypy
        run: |
          pip install -r scraper/requirements.txt
          pip install -r browser-api/requirements.txt
          pip install fastapi==0.115.5 'uvicorn[standard]==0.32.1'
        continue-on-error: true
      - run: mypy scraper jobs-api browser-api
        continue-on-error: true

  test-py-scraper:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pytest pyyaml
      - run: pytest scraper/tests -v

  test-py-jobs-api:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pytest httpx 'fastapi==0.115.5' 'uvicorn[standard]==0.32.1' pydantic
      - run: pytest jobs-api/tests -v

  # -----------------------------------------------------------------
  # Security
  # -----------------------------------------------------------------
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # trufflehog needs git history for diff mode
      - uses: trufflesecurity/trufflehog@v3.84.2
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

  dep-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
          format: table

  # -----------------------------------------------------------------
  # Docker image builds. PR runs only build (sanity); merge-to-main
  # also pushes to GHCR.
  # -----------------------------------------------------------------
  build-images:
    runs-on: ubuntu-latest
    needs: [lint-web, lint-py, test-web, test-py-scraper, test-py-jobs-api]
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: web
            context: ./web
            image: natson-web
          - service: scraper
            context: ./scraper
            image: natson-scraper
          - service: browser-api
            context: ./browser-api
            image: natson-browser-api
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v4
      - name: Login to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Build (and push on main)
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

  # jobs-api builds on top of the scraper image, so we build it after
  # the scraper push lands. (For PR builds it's a single-shot build
  # using FROM ghcr.io/.../natson-scraper:latest as the base — works
  # because GHCR is public/read for the org.)
  build-jobs-api:
    runs-on: ubuntu-latest
    needs: [build-images]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/natson-jobs-api
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest
      - name: Retag scraper as natson-scraper:latest locally
        # jobs-api/Dockerfile says FROM natson-scraper:latest; pull the
        # just-built scraper image from GHCR and tag it locally so the
        # build can find it.
        run: |
          docker pull ghcr.io/${{ github.repository_owner }}/natson-scraper:latest
          docker tag ghcr.io/${{ github.repository_owner }}/natson-scraper:latest natson-scraper:latest
      - uses: docker/build-push-action@v6
        with:
          context: ./jobs-api
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
